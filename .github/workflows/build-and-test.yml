name: Build and Test

on:
  pull_request:
    branches:
      - master
    paths:
      - src/**
      - tests/**
      - '*.slnx'

env:
  DOTNET_VERSION: 10.0.x

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FinanceTelegramBot.slnx

      - name: Build
        run: dotnet build FinanceTelegramBot.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FinanceTelegramBot.slnx --configuration Release --no-build --verbosity normal

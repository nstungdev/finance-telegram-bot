name: Deploy API To AWS Lambda

on:
  push:
    branches:
      - master
    paths:
      - src/**
      - template.yaml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DOTNET_VERSION: 10.0.x
  API_PROJECT_PATH: src/FinanceTelegramBot.API/FinanceTelegramBot.API.csproj
  PUBLISH_DIR: artifacts/publish
  SAM_STACK_NAME: finance-telegram-bot

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Restore
        run: dotnet restore FinanceTelegramBot.slnx

      - name: Publish API
        run: >
          dotnet publish ${{ env.API_PROJECT_PATH }}
          --configuration Release
          --output ${{ env.PUBLISH_DIR }}
          --runtime linux-x64
          --self-contained false
          /p:PublishAot=false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM Deploy
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              TelegramBotToken=${{ secrets.TELEGRAM_BOT_TOKEN }} \
              TelegramDefaultChatId=${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}

      - name: Get Function URL
        id: get-url
        run: |
          FUNC_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionUrl'].OutputValue" \
            --output text)
          echo "function_url=$FUNC_URL" >> "$GITHUB_OUTPUT"

      - name: Set Telegram Webhook
        run: |
          FUNC_URL="${{ steps.get-url.outputs.function_url }}"
          FUNC_URL="${FUNC_URL%/}"
          WEBHOOK_URL="${FUNC_URL}/api/telegram/telegram/webhook"
          curl -sf -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -d "url=$WEBHOOK_URL" \
            -d "allowed_updates=[\"message\"]" \
            -d "drop_pending_updates=true"

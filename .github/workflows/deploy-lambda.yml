name: Deploy API To AWS Lambda

on:
  push:
    branches:
      - master
    paths:
      - src/**
      - template.yaml
      - telegram-bot-commands.json
      - .github/workflows/deploy-lambda.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DOTNET_VERSION: 10.0.x
  API_PROJECT_PATH: src/FinanceTelegramBot.API/FinanceTelegramBot.API.csproj
  PUBLISH_DIR: artifacts/publish
  SAM_STACK_NAME: finance-telegram-bot

jobs:
  deploy:
    runs-on: ubuntu-latest

    outputs:
      function_url: ${{ steps.get-url.outputs.function_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Restore
        run: dotnet restore FinanceTelegramBot.slnx

      - name: Publish API
        run: >
          dotnet publish ${{ env.API_PROJECT_PATH }}
          --configuration Release
          --output ${{ env.PUBLISH_DIR }}
          --runtime linux-x64
          --self-contained false
          /p:PublishAot=false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM Deploy
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              TelegramBotToken=${{ secrets.TELEGRAM_BOT_TOKEN }} \
              TelegramDefaultChatId=${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}

      - name: Get Function URL
        id: get-url
        run: |
          FUNC_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionUrl'].OutputValue | [0]" \
            --output text)
          echo "Function URL: $FUNC_URL"
          if [ -z "$FUNC_URL" ] || [ "$FUNC_URL" = "None" ]; then
            echo "::error::Function URL not found in stack outputs"
            exit 1
          fi
          echo "function_url=$FUNC_URL" >> "$GITHUB_OUTPUT"

  set-webhook:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Set Telegram Webhook
        run: |
          FUNC_URL="${{ needs.deploy.outputs.function_url }}"
          FUNC_URL="${FUNC_URL%/}"
          WEBHOOK_URL="${FUNC_URL}/api/telegram/telegram/webhook"
          curl -sf -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -d "url=$WEBHOOK_URL" \
            -d "allowed_updates=[\"message\"]" \
            -d "drop_pending_updates=true"

  sync-bot-commands:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: telegram-bot-commands.json
          sparse-checkout-cone-mode: false

      - name: Check Bot Commands Changed
        id: check-commands
        run: |
          COMMANDS_FILE="telegram-bot-commands.json"
          NORMALIZED=$(jq -cS '.' "$COMMANDS_FILE")
          LOCAL_HASH=$(echo -n "$NORMALIZED" | sha256sum | awk '{print $1}')

          REMOTE_COMMANDS=$(curl -sf \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getMyCommands" \
            | jq -cS '[.result[] | {command, description}]')
          REMOTE_HASH=$(echo -n "$REMOTE_COMMANDS" | sha256sum | awk '{print $1}')

          echo "local_hash=$LOCAL_HASH"
          echo "remote_hash=$REMOTE_HASH"

          if [ "$LOCAL_HASH" != "$REMOTE_HASH" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Bot Commands
        if: steps.check-commands.outputs.changed == 'true'
        run: |
          echo "Deleting existing commands..."
          curl -sf -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteMyCommands"

          echo "Setting new commands..."
          COMMANDS=$(jq -cS '.' telegram-bot-commands.json)
          curl -sf -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setMyCommands" \
            -H "Content-Type: application/json" \
            -d "{\"commands\": $COMMANDS}"
